version: '3.8'

services:

  # ── BASES DE DONNÉES ──────────────────

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - elearning-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: elearning_courses
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - elearning-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MICROSERVICES ─────────────────────

  user-service:
    build: ./services/user-service
    container_name: user-service
    ports:
      - "8002:8002"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/elearning_users
      JWT_SECRET: ma_super_cle_secrete
      PORT: 8002
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - elearning-network
    restart: unless-stopped

  course-service:
    build: ./services/course-service
    container_name: course-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/elearning_courses
      JWT_SECRET: ma_super_cle_secrete
      PORT: 8001
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - elearning-network
    restart: unless-stopped

  analytics-service:
    build: ./services/analytics-service
    container_name: analytics-service
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/elearning_analytics
      JWT_SECRET: ma_super_cle_secrete
      PORT: 8003
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - elearning-network
    restart: unless-stopped

  ai-tutor-service:
    build: ./services/ai-tutor-service
    container_name: ai-tutor-service
    ports:
      - "8004:8004"
    environment:
      JWT_SECRET: ma_super_cle_secrete
      PORT: 8004
      OLLAMA_URL: http://ollama:11434
      MODEL_NAME: mistral
    networks:
      - elearning-network
    restart: unless-stopped

  # ── OLLAMA ────────────────────────────

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - elearning-network
    restart: unless-stopped

  # ── N8N ───────────────────────────────
# ── MINIO ─────────────────────────────

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"    # API S3
      - "9001:9001"    # Console web
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - elearning-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
  n8n:
    image: n8nio/n8n
    container_name: n8n-automation
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: admin
      N8N_HOST: localhost
      # ✅ Ajoute ces lignes pour stopper les erreurs
      N8N_COMMUNITY_PACKAGES_ENABLED: "false"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      EXECUTIONS_PROCESS: "main"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - elearning-network
    restart: unless-stopped
  # ── FRONTEND ──────────────────────────

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_USER_API: http://localhost:8002
      NEXT_PUBLIC_COURSE_API: http://localhost:8001
      NEXT_PUBLIC_ANALYTICS_API: http://localhost:8003
      NEXT_PUBLIC_AI_API: http://localhost:8004
    depends_on:
      - user-service
      - course-service
    networks:
      - elearning-network
    restart: unless-stopped

  # ── NGINX ─────────────────────────────

  nginx-gateway:
    image: nginx:alpine
    container_name: nginx-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - user-service
      - course-service
    networks:
      - elearning-network
    restart: unless-stopped

networks:
  elearning-network:
    driver: bridge

volumes:
  mongo_data:
  postgres_data:
  n8n_data:
  ollama_data:
  minio_data: