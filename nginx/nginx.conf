events {
    worker_connections 1024;
}

http {
    upstream user-service {
        server user-service:8002;
    }
    upstream course-service {
        server course-service:8001;
    }
    upstream analytics-service {
        server analytics-service:8003;
    }
    upstream ai-tutor {
        server ai-tutor-service:8004;
    }
    upstream frontend {
        server frontend:3001;
    }

    server {
        listen 80;

        location /api/auth/ {
            proxy_pass http://user-service/api/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/courses/ {
            proxy_pass http://course-service/api/courses/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/analytics/ {
            proxy_pass http://analytics-service/api/analytics/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/ai/ {
            proxy_pass http://ai-tutor/api/ai/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location / {
            proxy_pass http://frontend/;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}